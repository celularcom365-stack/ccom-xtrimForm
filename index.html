<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtrim</title>
  <link rel="icon" type="image/png" href="public/icon.png">
  <link rel="stylesheet" href="global.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #FFCC02;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #80388B;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-area h1 {
      color: #FFCC02;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    .logo-area p {
      color: #FFCC02;
      font-size: 13px;
      margin-top: 4px;
      font-weight: 500;
    }

    .divider {
      height: 3px;
      background: white;
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label .opcional {
      color: #aaa;
      font-weight: 400;
      text-transform: none;
      font-size: 12px;
      letter-spacing: 0;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0eaf5;
      border-radius: 10px;
      font-size: 15px;
      color: black;
      background: #f7faff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #16a6d8;
      box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.15);
      background: white;
    }

    input::placeholder {
      color: #a0aab0;
    }

    .btn-whatsapp {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #25D366, #1ebe57);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    .btn-whatsapp:active {
      transform: translateY(0);
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #90a4ae;
      line-height: 1.5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 30px 22px;
        border-radius: 16px;
      }
      .logo-area h1 { font-size: 19px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-area">
      <div><img src="./public/mariposa.png" width="200px"></div>
      <h1>¡Nos interesa conectarte!</h1>
      <p>Completa el formulario y te contactamos</p>
    </div>

    <div class="divider"></div>

    <form id="miFormulario">

      <div class="form-group" style="display: none;">
        <label>🏢 Nombre de la Empresa</label>
        <input type="text" id="empresa" placeholder="Ej: Empresa S.A.">
      </div>

      <div class="form-group">
        <label>👤 Nombre del Contacto</label>
        <input type="text" id="contacto" placeholder="Tu nombre completo" required>
      </div>

      <div class="form-group">
        <label>📱 Número de Teléfono</label>
        <input type="tel" id="telefono" placeholder="Ej: 0987654321" pattern="^09[0-9]{8}$" maxlength="10" required>
      </div>

      <div class="form-group">
        <label>🪪 Cédula <span class="opcional">(opcional)</span></label>
        <input type="text" id="ruc" placeholder="Ej: 1234567890001" pattern="^[0-9]{10}$|^[0-9]{13}$">
      </div>

      <button type="submit" class="btn-whatsapp">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Enviar por WhatsApp
      </button>

    </form>

    <p class="footer-note">🔒 Tu información es confidencial y solo será usada para contactarte.</p>
  </div>

  <script>
    document.getElementById('miFormulario').addEventListener('submit', function(e) {
      e.preventDefault();

      const empresa   = document.getElementById('empresa').value.trim();
      const contacto  = document.getElementById('contacto').value.trim();
      const telefono  = document.getElementById('telefono').value.trim();
      const ruc       = document.getElementById('ruc').value.trim();

      fetch("https://script.google.com/macros/s/AKfycbwok-CCKSIZBwh9sbxDuG8B0FMSV-OrWp1jfVaPUbrX15nF6XbrNdaJt_9j2mlkKS0/exec", {
        method: "POST",
        body: JSON.stringify({
          type: "XTRIM",
          empresa: empresa,
          contacto: contacto,
          telefono: telefono,
          ruc: ruc
        })
      });

      // 👇 Cambia por TU número (código de país + número, sin + ni espacios)
      const tuNumero = '593998864756';

      let texto = `👤 *Contacto:* ${contacto}\n`;
      texto    += `📱 *Teléfono:* ${telefono}\n`;
      if (ruc) texto += `🪪 *RUC/Cédula:* ${ruc}\n`;
      texto    += `\n¡Estamos interesados en sus productos! ✨`;

      const url = `https://wa.me/${tuNumero}?text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    });
  </script>

</body>
</html>
